<h2 mat-dialog-title>Créer un bail</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
  <mat-dialog-content>
    <mat-form-field appearance="outline">
      <mat-label>Email du locataire</mat-label>
      <input matInput type="email" formControlName="tenantEmail" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Date de début</mat-label>
      <input matInput type="date" formControlName="startDate" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Date de fin</mat-label>
      <input matInput type="date" formControlName="endDate" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Loyer mensuel (MAD)</mat-label>
      <input matInput type="number" formControlName="monthlyRent" />
    </mat-form-field>

    @if (errorMessage()) {
      <p class="error-banner">{{ errorMessage() }}</p>
    }
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Annuler</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="isSubmitting()">
      Créer le bail
    </button>
  </mat-dialog-actions>
</form>
