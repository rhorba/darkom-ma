<mat-toolbar>
  <span>Propriétés</span>
  <span class="spacer"></span>
  <button mat-raised-button color="primary" (click)="openCreateDialog()">Nouvelle propriété</button>
</mat-toolbar>

<table mat-table [dataSource]="properties()" class="properties-table">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Nom</th>
    <td mat-cell *matCellDef="let property">{{ property.name }}</td>
  </ng-container>

  <ng-container matColumnDef="city">
    <th mat-header-cell *matHeaderCellDef>Ville</th>
    <td mat-cell *matCellDef="let property">{{ property.city }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Statut</th>
    <td mat-cell *matCellDef="let property">
      {{ property.archived ? 'Archivée' : 'Active' }}
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let property">
      @if (!property.archived) {
        <button mat-button (click)="archive(property, $event)">Archiver</button>
      }
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="openDetail(row)"></tr>
</table>

@if (properties().length === 0) {
  <p class="empty-state">Aucune propriété pour le moment.</p>
}
