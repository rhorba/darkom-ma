spring:
  application:
    name: darkom-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:darkom}
    username: ${DB_USER:darkom}
    password: ${DB_PASSWORD:darkom_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  storage:
    lease-documents-dir: ${LEASE_DOCUMENTS_DIR:./data/lease-documents}
  cors:
    allowed-origin: ${APP_BASE_URL:http://localhost:4200}
  cookie:
    secure: ${COOKIE_SECURE:true}
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-32-characters-minimum}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7
  cmi:
    merchant-id: ${CMI_MERCHANT_ID:changeme-cmi-merchant-id}
    api-key: ${CMI_API_KEY:changeme-cmi-api-key}
    secret-key: ${CMI_SECRET_KEY:changeme-cmi-secret-key}
    callback-url: ${CMI_CALLBACK_URL:http://localhost:8080/api/v1/payments/cmi/callback}
  email:
    api-key: ${EMAIL_API_KEY:changeme-email-api-key}
  reminders:
    days-before-due: ${REMINDER_DAYS_BEFORE_DUE:3}
    cron: "${REMINDER_CRON:0 0 8 * * *}"
